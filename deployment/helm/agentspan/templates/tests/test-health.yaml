{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "agentspan.fullname" . }}-test-health"
  labels:
    {{- include "agentspan.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command:
        - sh
        - -ec
        - |
          curl -fsS "http://{{ include "agentspan.fullname" . }}:{{ .Values.service.port }}/actuator/health" >/dev/null
{{- end }}
