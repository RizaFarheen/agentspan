{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agentspan.fullname" . }}-pdb
  labels:
    {{- include "agentspan.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "agentspan.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
{{- end }}
