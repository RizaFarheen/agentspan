name: Release Server

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run for vX.Y.Z tags (skip cli-v* or other prefixed tags)
    if: startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '-')
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' from tag (v1.0.0 -> 1.0.0)
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          cp build/libs/agentspan-runtime.jar ../agentspan-server-${{ steps.version.outputs.version }}.jar

      - name: Upload JAR to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            ../agentspan-server-${{ steps.version.outputs.version }}.jar \
            --repo "${{ github.repository }}"

      - name: Upload to S3 (versioned and latest)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          # Upload versioned artifact
          aws s3 cp ../agentspan-server-${{ steps.version.outputs.version }}.jar \
            s3://agentspan/agentspan-server-${{ steps.version.outputs.version }}.jar

          # Upload as latest
          aws s3 cp ../agentspan-server-${{ steps.version.outputs.version }}.jar \
            s3://agentspan/agentspan-server-latest.jar
