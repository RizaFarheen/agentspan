name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.10). Defaults to latest release tag."
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # ── Determine version ────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '-'))
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

  # ── Server ───────────────────────────────────────────────────────
  server-s3:
    needs: [prepare]
    uses: ./.github/workflows/release-server-s3.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  server-docker:
    needs: [prepare]
    uses: ./.github/workflows/release-server-docker.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  # ── CLI ──────────────────────────────────────────────────────────
  cli-github:
    needs: [prepare]
    uses: ./.github/workflows/release-cli-github.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  cli-npm:
    needs: [prepare]
    uses: ./.github/workflows/release-cli-npm.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  cli-homebrew:
    needs: [prepare, cli-github]
    uses: ./.github/workflows/release-cli-homebrew.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  # ── SDKs ─────────────────────────────────────────────────────────
  python-sdk:
    needs: [prepare]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update pyproject.toml version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  js-sdk:
    needs: [prepare]
    uses: ./.github/workflows/release-js-sdk.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit
