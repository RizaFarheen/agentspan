name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  # Only run for vX.Y.Z tags (skip cli-v* or other prefixed tags)
  server:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '-')
    defaults:
      run:
        working-directory: server
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' from tag (v1.0.0 -> 1.0.0)
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          cp build/libs/agentspan-runtime.jar ../agentspan-server-${{ steps.version.outputs.version }}.jar

      - name: Upload JAR to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            ../agentspan-server-${{ steps.version.outputs.version }}.jar \
            --repo "${{ github.repository }}"

      - name: Upload to S3 (versioned and latest)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          # Upload versioned artifact
          aws s3 cp ../agentspan-server-${{ steps.version.outputs.version }}.jar \
            s3://agentspan/agentspan-server-${{ steps.version.outputs.version }}.jar

          # Upload as latest
          aws s3 cp ../agentspan-server-${{ steps.version.outputs.version }}.jar \
            s3://agentspan/agentspan-server-latest.jar

  cli:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '-')
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build binaries for all platforms
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${GITHUB_SHA}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X github.com/agentspan/agentspan/cli/cmd.Version=${VERSION} -X github.com/agentspan/agentspan/cli/cmd.Commit=${COMMIT} -X github.com/agentspan/agentspan/cli/cmd.Date=${DATE}"

          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_linux_amd64
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_linux_arm64
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_darwin_amd64
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_darwin_arm64
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_windows_amd64.exe
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_windows_arm64.exe

          chmod +x dist/agentspan_*

      - name: Upload CLI binaries to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            dist/agentspan_linux_amd64 \
            dist/agentspan_linux_arm64 \
            dist/agentspan_darwin_amd64 \
            dist/agentspan_darwin_arm64 \
            dist/agentspan_windows_amd64.exe \
            dist/agentspan_windows_arm64.exe \
            --repo "${{ github.repository }}"

      - name: Upload CLI binaries to S3 (versioned and latest)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for binary in dist/agentspan_*; do
            filename=$(basename "$binary")
            aws s3 cp "$binary" "s3://agentspan/cli/${VERSION}/${filename}"
            aws s3 cp "$binary" "s3://agentspan/cli/latest/${filename}"
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Update package.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Checkout Homebrew tap
        if: "!contains(github.event.release.tag_name, '-')"
        uses: actions/checkout@v4
        with:
          repository: agentspan/homebrew-agentspan
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        if: "!contains(github.event.release.tag_name, '-')"
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BREW_VERSION="${{ steps.version.outputs.version }}"

          SHA256_DARWIN_AMD64=$(shasum -a 256 dist/agentspan_darwin_amd64 | awk '{print $1}')
          SHA256_DARWIN_ARM64=$(shasum -a 256 dist/agentspan_darwin_arm64 | awk '{print $1}')
          SHA256_LINUX_AMD64=$(shasum -a 256 dist/agentspan_linux_amd64 | awk '{print $1}')
          SHA256_LINUX_ARM64=$(shasum -a 256 dist/agentspan_linux_arm64 | awk '{print $1}')

          cd ../homebrew-tap

          mkdir -p Formula

          cat > Formula/agentspan.rb << EOF
          class Agentspan < Formula
            desc "CLI for AgentSpan - Build, run, and manage AI agents"
            homepage "https://github.com/agentspan/agentspan"
            version "$BREW_VERSION"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/agentspan/agentspan/releases/download/v${BREW_VERSION}/agentspan_darwin_arm64"
                sha256 "$SHA256_DARWIN_ARM64"
              else
                url "https://github.com/agentspan/agentspan/releases/download/v${BREW_VERSION}/agentspan_darwin_amd64"
                sha256 "$SHA256_DARWIN_AMD64"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/agentspan/agentspan/releases/download/v${BREW_VERSION}/agentspan_linux_arm64"
                sha256 "$SHA256_LINUX_ARM64"
              else
                url "https://github.com/agentspan/agentspan/releases/download/v${BREW_VERSION}/agentspan_linux_amd64"
                sha256 "$SHA256_LINUX_AMD64"
              end
            end

            def install
              bin.install "agentspan_darwin_arm64" => "agentspan" if Hardware::CPU.arm? && OS.mac?
              bin.install "agentspan_darwin_amd64" => "agentspan" if Hardware::CPU.intel? && OS.mac?
              bin.install "agentspan_linux_arm64" => "agentspan" if Hardware::CPU.arm? && OS.linux?
              bin.install "agentspan_linux_amd64" => "agentspan" if Hardware::CPU.intel? && OS.linux?
            end

            test do
              system "#{bin}/agentspan", "version"
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentspan.rb
          git commit -m "Update agentspan to $BREW_VERSION"
          git push
